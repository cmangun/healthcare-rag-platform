# Healthcare RAG Platform - One-Command Demo
# Usage: docker compose up
# Then visit: http://localhost:8000/docs (Swagger UI)
# Or run: docker compose exec app python -m demo.run_queries

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - PHI_DETECTION_MODE=redact
      - DAILY_TOKEN_LIMIT=1000000
      - PER_REQUEST_TOKEN_LIMIT=4096
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ./demo:/app/demo:ro
